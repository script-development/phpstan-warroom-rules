version: 2

updates:
    - package-ecosystem: composer
      directory: /
      schedule:
          interval: weekly
          day: monday
      groups:
          illuminate:
              patterns:
                  - 'illuminate/*'
          phpunit:
              patterns:
                  - 'phpunit/*'
                  - 'sebastian/*'
                  - 'phpunit/php-*'
      open-pull-requests-limit: 10

    - package-ecosystem: github-actions
      directory: /
      schedule:
          interval: weekly
          day: monday
